# del_gcode - Delete G-Code After Print
# https://github.com/iamt4nk/del_gcode
#
# ADD REMOVE_GCODE to your slicer's start G-code (before START_PRINT)
# to flag the file for deletion after the print completes.

[gcode_macro REMOVE_AFTER_PRINT]
description: Flag the current G-code file for deletion after print completes
gcode:
	{action_call_remote_method("del_gcode_mark")}
	M117 G-Code file flagged for deletion
